# ===================================================================
# データベース接続設定 (Docker: horse-race-db)
# ===================================================================
# 接続URL: localhostの3307ポート（Dockerのマッピングに合わせる）、データベース名は 'mydatabase'
spring.datasource.url=jdbc:mysql://localhost:3307/mydatabase?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci
spring.datasource.username=root
spring.datasource.password=root

# JDBCドライバの指定
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate の設定（SQLの自動生成・ログ出力）
# ===================================================================
# アプリ起動時にエンティティクラスからテーブルを自動作成・更新する設定
spring.jpa.hibernate.ddl-auto=create-drop

# 実行されるSQL文をコンソール（ターミナル）に表示する
spring.jpa.show-sql=true

# 表示されるSQL文を読みやすく整形する
spring.jpa.properties.hibernate.format_sql=true

# MySQL 8系列に最適化した方言（Dialect）の指定
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Spring Boot起動時に裏で勝手に docker compose up するのを無効化する
spring.docker.compose.enabled=false